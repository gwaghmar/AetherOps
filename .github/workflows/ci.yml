name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ci_governance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ci_governance"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ci_governance
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-not-used-in-tests
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key-not-used-in-tests
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      DEFAULT_ORGANIZATION_ID: org_demo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build

      - run: npm run test:unit

      - run: npx drizzle-kit push --force

      - run: npm run db:seed

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
        env:
          CI: "true"
